name: Atualizar produtos Shopee

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Atualizar produtos
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run atualizar

      - name: Salvar alteracoes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza produtos afiliados Shopee"
          file_pattern: "index.html links-novos.txt"
