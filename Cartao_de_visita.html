<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfertaZap — Links</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0f0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* Fundo com gradiente radial laranja */
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(238,77,45,.3) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(238,77,45,.12) 0%, transparent 60%),
      #0f0f0f;
  }

  /* Partículas decorativas */
  .sparks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .spark {
    position: absolute;
    border-radius: 50%;
    background: rgba(238,77,45,.35);
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: .6; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 10;
    width: 360px;
    padding: 44px 36px 40px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 28px;
    backdrop-filter: blur(20px);
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
  }

  /* Logo */
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
    margin-bottom: 6px;
  }
  .logo span { color: #EE4D2D; }

  .tagline {
    font-size: .82rem;
    color: rgba(255,255,255,.4);
    letter-spacing: .8px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  /* Badge de fogo */
  .fire-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(238,77,45,.15);
    border: 1px solid rgba(238,77,45,.3);
    color: #ff7a5a;
    font-size: .72rem;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 24px;
    letter-spacing: .5px;
    text-transform: uppercase;
  }

  /* Links */
  .links { display: flex; flex-direction: column; gap: 14px; }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 16px;
    text-decoration: none;
    transition: transform .2s, box-shadow .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity .2s;
    background: rgba(255,255,255,.07);
  }
  .link-btn:hover { transform: translateY(-2px); }
  .link-btn:hover::before { opacity: 1; }
  .link-btn:active { transform: translateY(0); }

  .link-site {
    background: linear-gradient(135deg, #EE4D2D, #c73e22);
    box-shadow: 0 8px 24px rgba(238,77,45,.4);
  }
  .link-site:hover { box-shadow: 0 12px 32px rgba(238,77,45,.55); }

  .link-whatsapp {
    background: linear-gradient(135deg, #25d366, #1aa54f);
    box-shadow: 0 8px 24px rgba(37,211,102,.35);
  }
  .link-whatsapp:hover { box-shadow: 0 12px 32px rgba(37,211,102,.5); }

  .link-telegram {
    background: linear-gradient(135deg, #2AABEE, #1a8ec4);
    box-shadow: 0 8px 24px rgba(42,171,238,.35);
  }
  .link-telegram:hover { box-shadow: 0 12px 32px rgba(42,171,238,.5); }

  .link-icon {
    width: 42px;
    height: 42px;
    background: rgba(255,255,255,.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .link-text { text-align: left; flex: 1; }
  .link-label {
    display: block;
    font-size: .72rem;
    color: rgba(255,255,255,.65);
    font-weight: 500;
    letter-spacing: .4px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .link-title {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.3px;
  }

  .link-arrow {
    color: rgba(255,255,255,.5);
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  /* Divisor */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0;
    color: rgba(255,255,255,.15);
    font-size: .72rem;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,.08);
  }

  /* Stats */
  .stats {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,.06);
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #EE4D2D;
  }
  .stat-label {
    font-size: .68rem;
    color: rgba(255,255,255,.35);
    margin-top: 2px;
    letter-spacing: .3px;
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- Partículas -->
<div class="sparks" id="sparks"></div>

<div class="card">
  <div class="logo">Oferta<span>Zap</span></div>
  <div class="tagline">Afiliado Shopee Oficial</div>

  <div class="fire-badge">🔥 Ofertas todo dia</div>

  <div class="links">
    <a href="https://da.gd/OfertazZap" target="_blank" class="link-btn link-site">
      <div class="link-icon">🛍️</div>
      <div class="link-text">
        <span class="link-label">Site oficial</span>
        <span class="link-title">Ver todas as ofertas</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <div class="divider">ou</div>

    <a href="https://t.me/ZapOferta" target="_blank" class="link-btn link-telegram">
      <div class="link-icon">✈️</div>
      <div class="link-text">
        <span class="link-label">Canal Telegram</span>
        <span class="link-title">Ofertas todo dia</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <div class="divider">ou</div>

    <a href="https://whatsapp.com/channel/0029VbCheQRCnA7mEeNQRc3o" target="_blank" class="link-btn link-whatsapp">
      <div class="link-icon">💬</div>
      <div class="link-text">
        <span class="link-label">Canal WhatsApp</span>
        <span class="link-title">Receber ofertas</span>
      </div>
      <span class="link-arrow">→</span>
    </a>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">580+</div>
      <div class="stat-label">produtos</div>
    </div>
    <div class="stat">
      <div class="stat-num">80%</div>
      <div class="stat-label">de desconto</div>
    </div>
    <div class="stat">
      <div class="stat-num">Diário</div>
      <div class="stat-label">atualizado</div>
    </div>
  </div>
</div>

<script>
  // Gerar partículas flutuantes
  const sparks = document.getElementById('sparks');
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const size = Math.random() * 6 + 2;
    s.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 8 + 6}s;
      animation-delay: ${Math.random() * 8}s;
    `;
    sparks.appendChild(s);
  }
</script>

</body>
</html>
